name: Update JioHotstar Cookie and DRM

on:
  schedule:
    - cron: '0 */6 * * *'  # Har 6 ghante me
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Source Data
        run: curl -fsS https://raw.githubusercontent.com/alex8875/m3u/refs/heads/main/jcinema.m3u -o source_data.txt

      - name: Extract Cookie and License (Text-Stream Parsing)
        id: extract
        run: |
          python3 - <<EOF
          import re
          import os

          # Read the file as raw text to avoid JSON parsing errors
          with open('source_data.txt', 'r', errors='ignore') as f:
              content = f.read()
              
              # 1. Extract Cookie (hdnea or hdntl)
              # Finds hdntl=exp=... or hdnea=...
              cookie_match = re.search(r'(hdnea|hdntl)=[^"& \n\r]*', content)
              cookie = cookie_match.group(0) if cookie_match else ""
              
              # 2. Extract License from the clkey URL parameters
              # Targeted search for keyid and key inside that specific URL
              license = ""
              # Regex to find keyid and key in the vercel app link
              keyid_match = re.search(r'keyid=([a-f0-9]+)', content)
              key_match = re.search(r'key=([a-f0-9]+)', content)
              
              if keyid_match and key_match:
                  # Combines them into the required 5181...:3dca... format
                  license = f"{keyid_match.group(1)}:{key_match.group(1)}"

              # Export to GitHub Environment
              with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
                  out.write(f"cookie={cookie}\n")
                  out.write(f"license={license}\n")
                  
              print(f"DEBUG: Cookie Extracted: {cookie}")
              print(f"DEBUG: License Extracted: {license}")
          EOF

      - name: Update JioHotstar.json
        run: |
          COOKIE_VAL="${{ steps.extract.outputs.cookie }}"
          LICENSE_VAL="${{ steps.extract.outputs.license }}"

          if [ -z "$COOKIE_VAL" ] || [ -z "$LICENSE_VAL" ]; then
            echo "ERROR: Could not find Cookie or License in the source file."
            exit 1
          fi

          # Update all entries in JioHotstar.json
          # Updates .cookie, .drmLicense, and .key
          jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
          '(.channels[]? // .[]) |= (.cookie = $c | .drmLicense = $l | .key = $l)' \
          JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add JioHotstar.json
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Credentials updated: $(date)"
            git push
          fi
