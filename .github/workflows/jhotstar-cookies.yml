name: Update JioHotstar Cookie and DRM

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Source M3U
        run: curl -fsS https://raw.githubusercontent.com/alex8875/m3u/refs/heads/main/jcinema.m3u -o source.m3u

      - name: Extract Cookie and License (Python Robust)
        id: extract
        run: |
          # Use Python to extract values safely from large file
          python3 - <<EOF
          import re
          import os

          with open('source.m3u', 'r', errors='ignore') as f:
              content = f.read()
              
              # Extract Cookie
              cookie_match = re.search(r'(hdnea|hdntl)=[^"& \n\r]*', content)
              cookie = cookie_match.group(0) if cookie_match else ""
              
              # Extract KeyID and Key
              keyid_match = re.search(r'keyid=([a-f0-9]+)', content)
              key_match = re.search(r'key=([a-f0-9]+)', content)
              
              license = ""
              if keyid_match and key_match:
                  license = f"{keyid_match.group(1)}:{key_match.group(1)}"
              else:
                  # Fallback to hex:hex pattern
                  hex_match = re.search(r'([a-f0-9]{32}:[a-f0-9]{32})', content)
                  if hex_match:
                      license = hex_match.group(1)

              with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
                  out.write(f"cookie={cookie}\n")
                  out.write(f"license={license}\n")
                  
              print(f"DEBUG: Extracted Cookie: {cookie}")
              print(f"DEBUG: Extracted License: {license}")
          EOF

      - name: Update JioHotstar.json
        run: |
          COOKIE_VAL="${{ steps.extract.outputs.cookie }}"
          LICENSE_VAL="${{ steps.extract.outputs.license }}"

          # Error check: stop if we didn't find the values
          if [ -z "$COOKIE_VAL" ] || [ -z "$LICENSE_VAL" ]; then
            echo "Error: Extraction failed. Cookie or License is empty."
            exit 1
          fi

          # Update the JSON file (handles root list or 'channels' key)
          if jq -e '.channels' JioHotstar.json >/dev/null 2>&1; then
            jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
            '.channels[] |= (.cookie = $c | .drmLicense = $l | .key = $l | .license_key = $l)' \
            JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          else
            jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
            '.[] |= (.cookie = $c | .drmLicense = $l | .key = $l | .license_key = $l)' \
            JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add JioHotstar.json
          if git diff --staged --quiet; then
            echo "No changes in content."
          else
            git commit -m "Auto-refresh Cookie and License [skip ci]"
            git push
          fi
