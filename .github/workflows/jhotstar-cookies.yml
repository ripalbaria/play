name: Update JioHotstar Cookie and DRM

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Source JSON
        run: |
          # Downloading the source (which you confirmed is JSON content)
          curl -fsS https://raw.githubusercontent.com/alex8875/m3u/refs/heads/main/jcinema.m3u -o source.json

      - name: Extract Cookie and License from JSON
        id: extract
        run: |
          python3 - <<EOF
          import json
          import re
          import os
          from urllib.parse import urlparse, parse_qs

          try:
              with open('source.json', 'r') as f:
                  data = json.load(f)
              
              # If source is a list, pick the first entry with a license_url
              # If it's a dict with 'channels', navigate into it
              channels = data.get('channels', data) if isinstance(data, dict) else data
              
              cookie = ""
              license = ""

              for item in channels:
                  # Get Cookie
                  if not cookie:
                      cookie = item.get('cookie', '')
                  
                  # Get License from the license_url field
                  l_url = item.get('license_url', '')
                  if l_url and 'keyid=' in l_url:
                      parsed = urlparse(l_url)
                      params = parse_qs(parsed.query)
                      kid = params.get('keyid', [''])[0]
                      k = params.get('key', [''])[0]
                      if kid and k:
                          license = f"{kid}:{k}"
                          break # Found a valid license, stop searching

              with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
                  out.write(f"cookie={cookie}\n")
                  out.write(f"license={license}\n")
              
              print(f"Extracted Cookie: {cookie}")
              print(f"Extracted License: {license}")

          except Exception as e:
              print(f"Error parsing source JSON: {e}")
              exit(1)
          EOF

      - name: Update JioHotstar.json
        run: |
          COOKIE_VAL="${{ steps.extract.outputs.cookie }}"
          LICENSE_VAL="${{ steps.extract.outputs.license }}"

          if [ -z "$COOKIE_VAL" ] || [ -z "$LICENSE_VAL" ]; then
            echo "Failed to extract data from source JSON."
            exit 1
          fi

          # Update your destination JSON file
          jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
          '(.channels[]? // .[]) |= (.cookie = $c | .drmLicense = $l | .key = $l)' \
          JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add JioHotstar.json
          git diff --staged --quiet || (git commit -m "Update from source JSON" && git push)
