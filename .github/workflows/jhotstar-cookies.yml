name: Update JioHotstar Cookie from JSON in JioHotstar.json

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Source M3U
        run: curl -fsS https://raw.githubusercontent.com/alex8875/m3u/refs/heads/main/jcinema.m3u -o source.m3u

      - name: Extract Cookie Value
        id: extract
        run: |
          # Look for the full __hdnea__ cookie string inside the JSON block in the M3U
          COOKIE=$(grep -o '__hdnea__=[^"]*' source.m3u | head -1)
          
          if [ -z "$COOKIE" ]; then
            echo "No valid __hdnea__ cookie found in source!"
            exit 1
          fi
          
          echo "value=$COOKIE" >> $GITHUB_OUTPUT
          echo "Extracted: $COOKIE"

      - name: Update Cookie in JioHotstar.json
        run: |
          # Updates the 'cookie' field for all objects in the JioHotstar.json file
          # This assumes JioHotstar.json is a direct list [] or contains a 'channels' key
          if jq -e '.channels' JioHotstar.json >/dev/null 2>&1; then
            jq --arg c "${{ steps.extract.outputs.value }}" '.channels[] |= (.cookie = $c)' JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          else
            jq --arg c "${{ steps.extract.outputs.value }}" '.[] |= (.cookie = $c)' JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          fi

      - name: Commit & Push (Only if Changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add JioHotstar.json
          if git diff --staged --quiet; then
            echo "No change in cookie detected."
          else
            git commit -m "Update JioHotstar cookies from source [skip ci]"
            git push
          fi
