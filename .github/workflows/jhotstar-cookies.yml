name: Update JioHotstar Cookie and DRM

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Source M3U
        run: curl -fsS https://raw.githubusercontent.com/alex8875/m3u/refs/heads/main/jcinema.m3u -o source.m3u

      - name: Extract Cookie and License
        id: extract
        run: |
          # 1. Extract the cookie (hdnea or hdntl) - using -a to treat as text
          COOKIE=$(grep -oaE '(hdnea|hdntl)=[^"& ]*' source.m3u | head -1)
          
          # 2. Extract KeyID and Key separately from any URL in the file
          KEYID=$(grep -oaE 'keyid=[a-f0-9]+' source.m3u | head -1 | cut -d'=' -f2)
          KEYVAL=$(grep -oaE 'key=[a-f0-9]+' source.m3u | head -1 | cut -d'=' -f2)
          
          if [ -n "$KEYID" ] && [ -n "$KEYVAL" ]; then
            LICENSE="$KEYID:$KEYVAL"
          else
            # Fallback to direct hex:hex if URL params are missing
            LICENSE=$(grep -oaE '[a-f0-9]{32}:[a-f0-9]{32}' source.m3u | head -1)
          fi
          
          if [ -z "$COOKIE" ]; then
            echo "Error: No valid cookie found!"
            exit 1
          fi

          echo "cookie=$COOKIE" >> $GITHUB_OUTPUT
          echo "license=$LICENSE" >> $GITHUB_OUTPUT
          
          echo "DEBUG: Extracted Cookie: $COOKIE"
          echo "DEBUG: Extracted License: $LICENSE"

      - name: Update JioHotstar.json
        run: |
          COOKIE_VAL="${{ steps.extract.outputs.cookie }}"
          LICENSE_VAL="${{ steps.extract.outputs.license }}"

          # Using jq to update all possible key names used in different players
          # Targets both the root list or a 'channels' wrapped list
          if jq -e '.channels' JioHotstar.json >/dev/null 2>&1; then
            jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
            '.channels[] |= (.cookie = $c | .drmLicense = $l | .key = $l | .license_key = $l)' \
            JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          else
            jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
            '.[] |= (.cookie = $c | .drmLicense = $l | .key = $l | .license_key = $l)' \
            JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add JioHotstar.json
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Update Cookie and DRM License [skip ci]"
            git push
          fi
