import os

# Read the file as raw text to bypass encoding/structure errors
with open('source.txt', 'r', errors='ignore') as f:
    content = f.read()

# 1. Extract Cookie (Simple search)
cookie = ""
if 'hdntl=' in content:
    start = content.find('hdntl=')
    # Find the end of the cookie string (space or quote)
    end = content.find(' ', start) if ' ' in content[start:] else len(content)
    cookie = content[start:end].strip().replace('"', '').replace("'", "")

# 2. Extract License (keyid:key)
license_str = ""
if 'keyid=' in content and 'key=' in content:
    # Extract keyid
    k_id_start = content.find('keyid=') + 6
    k_id_end = content.find('&', k_id_start)
    keyid = content[k_id_start:k_id_end]

    # Extract key
    key_start = content.find('key=', k_id_end) + 4
    key_end = content.find(' ', key_start) if ' ' in content[key_start:] else len(content)
    key = content[key_start:key_end].strip().replace('"', '').replace("'", "")
    
    if keyid and key:
        license_str = f"{keyid}:{key}"

# Write to GitHub Output
with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
    out.write(f"cookie={cookie}\n")
    out.write(f"license={license_str}\n")
