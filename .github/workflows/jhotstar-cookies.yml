name: Update JioHotstar Cookie and DRM

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Source M3U
        run: curl -fsS https://raw.githubusercontent.com/alex8875/m3u/refs/heads/main/jcinema.m3u -o source.m3u

      - name: Extract Cookie and License
        id: extract
        run: |
          # Extract the cookie (supports hdnea or hdntl)
          COOKIE=$(grep -oE '(hdnea|hdntl)=[^"& ]*' source.m3u | head -1)
          
          # Extract the DRM License Key (looks for the 32:32 hex pattern)
          LICENSE=$(grep -oE '[a-f0-9]{32}:[a-f0-9]{32}' source.m3u | head -1)
          
          if [ -z "$COOKIE" ]; then
            echo "Error: No valid cookie found!"
            exit 1
          fi

          echo "cookie=$COOKIE" >> $GITHUB_OUTPUT
          echo "license=$LICENSE" >> $GITHUB_OUTPUT
          echo "Extracted Cookie: $COOKIE"
          echo "Extracted License: $LICENSE"

      - name: Update JioHotstar.json
        run: |
          # We update both 'cookie' and 'drmLicense' (or 'key') fields
          # Using jq to map through the array
          COOKIE_VAL="${{ steps.extract.outputs.cookie }}"
          LICENSE_VAL="${{ steps.extract.outputs.license }}"

          if jq -e '.channels' JioHotstar.json >/dev/null 2>&1; then
            jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
            '.channels[] |= (.cookie = $c | .drmLicense = $l | .key = $l)' \
            JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          else
            jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
            '.[] |= (.cookie = $c | .drmLicense = $l | .key = $l)' \
            JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add JioHotstar.json
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Update Cookie and DRM License [skip ci]"
            git push
          fi
