name: Update JioHotstar Cookie and DRM

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Source M3U
        run: curl -fsS https://raw.githubusercontent.com/alex8875/m3u/refs/heads/main/jcinema.m3u -o source.m3u

      - name: Extract Cookie and License (URL Based)
        id: extract
        run: |
          python3 - <<EOF
          import re
          import os

          with open('source.m3u', 'r', errors='ignore') as f:
              content = f.read()
              
              # 1. Extract Cookie (hdnea or hdntl)
              # Finds: hdntl=exp=...
              cookie_match = re.search(r'(hdnea|hdntl)=[^"& \n\r]*', content)
              cookie = cookie_match.group(0) if cookie_match else ""
              
              # 2. Extract License from the URL parameters
              # Looking for keyid=HEX and key=HEX inside the vercel app URL
              keyid_match = re.search(r'keyid=([a-f0-9]{32})', content)
              key_match = re.search(r'key=([a-f0-9]{32})', content)
              
              license = ""
              if keyid_match and key_match:
                  # This creates the colon format: 5181...:3dca...
                  license = f"{keyid_match.group(1)}:{key_match.group(1)}"

              # Save to GitHub environment
              with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
                  out.write(f"cookie={cookie}\n")
                  out.write(f"license={license}\n")
                  
              print(f"DEBUG: Found Cookie: {cookie}")
              print(f"DEBUG: Formatted License: {license}")
          EOF

      - name: Update JioHotstar.json
        run: |
          COOKIE_VAL="${{ steps.extract.outputs.cookie }}"
          LICENSE_VAL="${{ steps.extract.outputs.license }}"

          # If either is empty, the script will stop here and show an error
          if [ -z "$COOKIE_VAL" ] || [ -z "$LICENSE_VAL" ]; then
            echo "ERROR: Data not found in source file!"
            exit 1
          fi

          # Update the JSON file
          # We update .cookie and .drmLicense (which is where your destination file stores the key)
          if jq -e '.channels' JioHotstar.json >/dev/null 2>&1; then
            jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
            '.channels[] |= (.cookie = $c | .drmLicense = $l | .key = $l)' \
            JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          else
            jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
            '.[] |= (.cookie = $c | .drmLicense = $l | .key = $l)' \
            JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add JioHotstar.json
          if git diff --staged --quiet; then
            echo "No updates needed."
          else
            git commit -m "Auto-update credentials [skip ci]"
            git push
          fi
