name: Update JioHotstar Cookie and DRM

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Source Data
        run: |
          # We download it as a raw text file to avoid any JSON/M3U parsing errors
          curl -fsSL "https://raw.githubusercontent.com/alex8875/m3u/refs/heads/main/jcinema.m3u" -o raw_source.txt

      - name: Extract Cookie and License (Deep Search)
        id: extract
        run: |
          python3 - <<EOF
          import re
          import os

          # Open the file in binary mode then decode to avoid 'line 1 column 1' or encoding errors
          with open('raw_source.txt', 'rb') as f:
              content = f.read().decode('utf-8', errors='ignore')

          # 1. Extract Cookie (finding hdntl= or hdnea=)
          cookie_match = re.search(r'(hdntl|hdnea)=exp=[^"& \n\r]*', content)
          cookie = cookie_match.group(0) if cookie_match else ""

          # 2. Extract License (Finding keyid and key anywhere in the file)
          # We look for the hex values specifically
          kid_match = re.search(r'keyid=([a-f0-9]{32})', content, re.I)
          key_match = re.search(r'key=([a-f0-9]{32})', content, re.I)

          license_val = ""
          if kid_match and key_match:
              license_val = f"{kid_match.group(1)}:{key_match.group(1)}"
          
          # Debugging prints to GitHub Logs
          print(f"FOUND COOKIE: {cookie}")
          print(f"FOUND LICENSE: {license_val}")

          # Write to GitHub Output
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"cookie={cookie}\n")
              out.write(f"license={license_val}\n")
          EOF

      - name: Update JioHotstar.json
        run: |
          COOKIE_VAL="${{ steps.extract.outputs.cookie }}"
          LICENSE_VAL="${{ steps.extract.outputs.license }}"

          # If extraction failed, stop the action so we don't break your JSON
          if [ -z "$COOKIE_VAL" ] || [ -z "$LICENSE_VAL" ]; then
            echo "CRITICAL ERROR: Could not find Cookie or License in the source file."
            exit 1
          fi

          # Update all entries in your JioHotstar.json
          # We update 'cookie', 'drmLicense', and 'key' fields
          jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
          '(.channels[]? // .[]) |= (.cookie = $c | .drmLicense = $l | .key = $l)' \
          JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add JioHotstar.json
          if git diff --staged --quiet; then
            echo "No change in data."
          else
            git commit -m "Credentials Auto-Update: $(date)"
            git push
          fi
