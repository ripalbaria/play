name: Update JioHotstar Cookie and DRM

on:
  schedule:
    - cron: '0 */6 * * *'  # Har 6 ghante me chalega
  workflow_dispatch:      # Manual trigger ke liye

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Source Data
        run: |
          # Source file download karein
          curl -fskSL "https://raw.githubusercontent.com/alex8875/m3u/refs/heads/main/jcinema.m3u" -o source.txt

      - name: Precise Extraction
        id: extract
        run: |
          python3 - <<EOF
          import os

          # File ko raw text ki tarah read karenge taaki JSON error na aaye
          with open('source.txt', 'r', errors='ignore') as f:
              data = f.read()

          # 1. Cookie Extraction (Simple find method)
          cookie = ""
          if 'hdntl=' in data:
              start = data.find('hdntl=')
              # Space ya Quote tak ka data uthayenge
              end_space = data.find(' ', start)
              end_quote = data.find('"', start)
              # Jo pehle mile wahi end point
              end = min(filter(lambda x: x > 0, [end_space, end_quote, len(data)]))
              cookie = data[start:end].strip()
          elif 'hdnea=' in data:
              start = data.find('hdnea=')
              end_space = data.find(' ', start)
              end_quote = data.find('"', start)
              end = min(filter(lambda x: x > 0, [end_space, end_quote, len(data)]))
              cookie = data[start:end].strip
