name: Update JioHotstar Cookie and DRM

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Source Data
        run: |
          curl -fskSL "https://raw.githubusercontent.com/alex8875/m3u/refs/heads/main/jcinema.m3u" -o source.txt

      - name: Forensic Extraction
        id: extract
        run: |
          python3 - <<EOF
          import re
          import os

          # Read raw bytes and decode with 'ignore' to bypass encoding errors
          with open('source.txt', 'rb') as f:
              raw_data = f.read().decode('utf-8', errors='ignore')

          # 1. Extract Cookie (Targeting hdntl or hdnea)
          # Simplified pattern to avoid 'unterminated character set' errors
          cookie_match = re.search(r'(hdntl|hdnea)=exp=[^"& \s\\]+', raw_data)
          cookie = cookie_match.group(0) if cookie_match else ""

          # 2. Extract KeyID and Key
          # We search for the alphanumeric strings following keyid= and key=
          kid_match = re.search(r'keyid=([a-f0-9]+)', raw_data, re.I)
          key_match = re.search(r'key=([a-f0-9]+)', raw_data, re.I)

          license = ""
          if kid_match and key_match:
              license = f"{kid_match.group(1)}:{key_match.group(1)}"
          
          print(f"DEBUG_COOKIE: {cookie}")
          print(f"DEBUG_LICENSE: {license}")

          # Write to GITHUB_OUTPUT
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"cookie={cookie}\n")
              out.write(f"license={license}\n")
          EOF

      - name: Update JioHotstar.json
        run: |
          COOKIE_VAL="${{ steps.extract.outputs.cookie }}"
          LICENSE_VAL="${{ steps.extract.outputs.license }}"

          # Strict validation
          if [ -z "$COOKIE_VAL" ] || [ -z "$LICENSE_VAL" ]; then
            echo "CRITICAL: Extraction failed. Cookie or License is empty."
            exit 1
          fi

          # Apply updates using jq
          # This targets .cookie, .drmLicense, and .key as seen in your destination file
          jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
          '(.channels[]? // .[]) |= (.cookie = $c | .drmLicense = $l | .key = $l)' \
          JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add JioHotstar.json
          if git diff --staged --quiet; then
            echo "No update needed."
          else
            git commit -m "Refresh JioHotstar Credentials: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
