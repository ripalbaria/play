name: Update JioHotstar Cookie

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Source M3U
        run: curl -fsS https://raw.githubusercontent.com/alex8875/m3u/refs/heads/main/jcinema.m3u -o source.m3u

      - name: Extract Cookie Value
        id: extract
        run: |
          # Smart search for both hdnea and hdntl patterns
          COOKIE=$(grep -oE '(hdnea|hdntl)=[^"& ]*' source.m3u | head -1)
          
          if [ -z "$COOKIE" ]; then
            echo "Error: No valid cookie found in source M3U!"
            exit 1
          fi
          
          echo "value=$COOKIE" >> $GITHUB_OUTPUT
          echo "Extracted Cookie: $COOKIE"

      - name: Update Cookie in JioHotstar.json
        run: |
          # Use jq to update the 'cookie' field. 
          # This version handles both direct arrays and 'channels' wrapped arrays.
          if jq -e '.channels' JioHotstar.json >/dev/null 2>&1; then
            jq --arg c "${{ steps.extract.outputs.value }}" '.channels[] |= (.cookie = $c)' JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          else
            jq --arg c "${{ steps.extract.outputs.value }}" '.[] |= (.cookie = $c)' JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add JioHotstar.json
          if git diff --staged --quiet; then
            echo "No change in cookie detected."
          else
            git commit -m "Auto-update JioHotstar cookies [skip ci]"
            git push
          fi
