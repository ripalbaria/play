name: Update JioHotstar Cookie and DRM

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Source M3U
        run: curl -fsS https://raw.githubusercontent.com/alex8875/m3u/refs/heads/main/jcinema.m3u -o source.m3u

      - name: Extract Cookie and License
        id: extract
        run: |
          # Use 'strings' to remove any non-text characters that cause grep errors
          CLEAN_TEXT=$(strings source.m3u)
          
          # 1. Extract the cookie (hdnea or hdntl)
          COOKIE=$(echo "$CLEAN_TEXT" | grep -oE '(hdnea|hdntl)=[^"& ]*' | head -1)
          
          # 2. Extract KeyID and Key separately using sed for accuracy
          # Targeted specifically at the clkey.vercel.app format
          KEYID=$(echo "$CLEAN_TEXT" | grep -oE 'keyid=[a-f0-9]+' | head -1 | cut -d'=' -f2)
          KEYVAL=$(echo "$CLEAN_TEXT" | grep -oE 'key=[a-f0-9]+' | head -1 | cut -d'=' -f2)
          
          if [ -n "$KEYID" ] && [ -n "$KEYVAL" ]; then
            LICENSE="$KEYID:$KEYVAL"
          else
            # Final fallback if URL parameters are missing
            LICENSE=$(echo "$CLEAN_TEXT" | grep -oE '[a-f0-9]{32}:[a-f0-9]{32}' | head -1)
          fi
          
          if [ -z "$COOKIE" ]; then
            echo "Error: Cookie extraction failed!"
            exit 1
          fi

          echo "cookie=$COOKIE" >> $GITHUB_OUTPUT
          echo "license=$LICENSE" >> $GITHUB_OUTPUT
          
          echo "DEBUG: Extracted Cookie: $COOKIE"
          echo "DEBUG: Extracted License: $LICENSE"

      - name: Update JioHotstar.json
        run: |
          COOKIE_VAL="${{ steps.extract.outputs.cookie }}"
          LICENSE_VAL="${{ steps.extract.outputs.license }}"

          # Updates all entries in JioHotstar.json
          # Handles both 'channels' wrapper or direct array
          if jq -e '.channels' JioHotstar.json >/dev/null 2>&1; then
            jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
            '.channels[] |= (.cookie = $c | .drmLicense = $l | .key = $l | .license_key = $l)' \
            JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          else
            jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
            '.[] |= (.cookie = $c | .drmLicense = $l | .key = $l | .license_key = $l)' \
            JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add JioHotstar.json
          if git diff --staged --quiet; then
            echo "No changes in content."
          else
            git commit -m "Auto-refresh Cookie and License [skip ci]"
            git push
          fi
