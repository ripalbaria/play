name: Update JioHotstar Cookie and DRM

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Source M3U
        run: curl -fsS https://raw.githubusercontent.com/alex8875/m3u/refs/heads/main/jcinema.m3u -o source.m3u

      - name: Extract Cookie and License
        id: extract
        run: |
          # 1. Extract the cookie (hdnea or hdntl)
          COOKIE=$(grep -oE '(hdnea|hdntl)=[^"& ]*' source.m3u | head -1)
          
          # 2. Extract KeyID and Key from the URL parameters
          # Searches for the clkey vercel URL and grabs the hex values
          URL_LINE=$(grep -oE 'https://clkey.vercel.app/api/results.php\?keyid=[a-f0-9]+&key=[a-f0-9]+' source.m3u | head -1)
          
          KEYID=$(echo "$URL_LINE" | sed -n 's/.*keyid=\([a-f0-9]*\).*/\1/p')
          KEYVAL=$(echo "$URL_LINE" | sed -n 's/.*key=\([a-f0-9]*\).*/\1/p')
          
          if [ -n "$KEYID" ] && [ -n "$KEYVAL" ]; then
            LICENSE="$KEYID:$KEYVAL"
          else
            # Fallback to direct hex:hex if URL pattern isn't found
            LICENSE=$(grep -oE '[a-f0-9]{32}:[a-f0-9]{32}' source.m3u | head -1)
          fi
          
          if [ -z "$COOKIE" ]; then
            echo "Error: No valid cookie found!"
            exit 1
          fi

          echo "cookie=$COOKIE" >> $GITHUB_OUTPUT
          echo "license=$LICENSE" >> $GITHUB_OUTPUT
          echo "Extracted Cookie: $COOKIE"
          echo "Extracted License: $LICENSE"

      - name: Update JioHotstar.json
        run: |
          COOKIE_VAL="${{ steps.extract.outputs.cookie }}"
          LICENSE_VAL="${{ steps.extract.outputs.license }}"

          # Updates all relevant fields for your player
          if jq -e '.channels' JioHotstar.json >/dev/null 2>&1; then
            jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
            '.channels[] |= (.cookie = $c | .drmLicense = $l | .key = $l | .license_key = $l)' \
            JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          else
            jq --arg c "$COOKIE_VAL" --arg l "$LICENSE_VAL" \
            '.[] |= (.cookie = $c | .drmLicense = $l | .key = $l | .license_key = $l)' \
            JioHotstar.json > tmp.json && mv tmp.json JioHotstar.json
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add JioHotstar.json
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Update Cookie and DRM License [skip ci]"
            git push
          fi
