name: Update SonyLIV Channels (HTTP Proxy :80)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🎯 Fetch SonyLIV hdnea (proxy used ONLY here)
      - name: Fetch hdnea via HTTP proxy :80
        id: fetch_hdnea
        run: |
          set -e

          API_URL="https://apiv4.sonyliv.com/AGL/4.7/A/ENG/MWEB/IN/BR/CONTENT/VIDEOURL/VOD/1000051729"

          RESPONSE=$(curl -sL \
            --http1.1 \
            --proxy http://14.195.222.149:80 \
            --proxy-insecure \
            --insecure \
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Safari/537.36' \
            -H 'Accept: application/json, text/plain, */*' \
            -H 'Accept-Language: en-US,en;q=0.9' \
            -H 'Referer: https://www.sonyliv.com/' \
            -H 'Origin: https://www.sonyliv.com' \
            "$API_URL")

          VIDEO_URL=$(echo "$RESPONSE" | jq -r '.videoURL // empty')

          if [ -z "$VIDEO_URL" ]; then
            echo "❌ videoURL not found"
            exit 1
          fi

          HDNEA=$(echo "$VIDEO_URL" | grep -o 'hdnea=[^&]*' | head -1)

          if [ -z "$HDNEA" ]; then
            echo "❌ hdnea not found"
            exit 1
          fi

          echo "HDNEA=$HDNEA" >> "$GITHUB_OUTPUT"

      # 📝 Update JSON
      - name: Update Slivtv.json
        run: |
          sed -i "s|hdnea=[^&\"' ]*|${{ steps.fetch_hdnea.outputs.HDNEA }}|g" Slivtv.json

      # 🚀 Commit & push (NO proxy here)
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Slivtv.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto-update SonyLIV hdnea"
            git push
          fi
