name: Update SonyLIV Channels 

on:
  schedule:
    - cron: '0 */4 * * *'   # Har 4 ghante mein auto-run hoga
  workflow_dispatch:        # Manual run karne ke liye

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch hdnea (Bypass via Indian VPS)
        id: fetch_hdnea
        run: |
          # Aapka Oracle VPS IP aur Python/Squid Port
          PROXY="http://140.245.25.215:3128"
          API_URL="https://apiv4.sonyliv.com/AGL/4.7/A/ENG/MWEB/IN/BR/CONTENT/VIDEOURL/VOD/1000051729"

          echo "Fetching API using Indian Proxy..."
          RESPONSE=$(curl -s -L -x "$PROXY" \
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Safari/537.36' \
            -H 'Accept: application/json, text/plain, */*' \
            -H 'Referer: https://www.sonyliv.com/' \
            -H 'Origin: https://www.sonyliv.com' \
            "$API_URL")

          # Debugging ke liye response save karein
          echo "$RESPONSE" > api_response.json

          # VideoURL extract karein
          VIDEO_URL=$(echo "$RESPONSE" | grep -o '"videoURL":"[^"]*' | cut -d'"' -f4 | head -1)
          
          if [ -z "$VIDEO_URL" ]; then
            echo "Error: VideoURL nahi mila! Shayad Proxy down hai ya IP block ho gaya."
            cat api_response.json
            exit 1
          fi

          # hdnea extract karein (MPD content ya URL se)
          HDNEA=$(echo "$VIDEO_URL" | grep -o 'hdnea=[^&" ]*' | head -1)

          if [ -z "$HDNEA" ]; then
            echo "Error: hdnea token nahi mila!"
            exit 1
          fi

          echo "Success! Extracted hdnea: $HDNEA"
          echo "HDNEA=$HDNEA" >> $GITHUB_OUTPUT

      - name: Update Slivtv.json
        run: |
          HDNEA="${{ steps.fetch_hdnea.outputs.HDNEA }}"
          FILE="Slivtv.json"

          if [ ! -f "$FILE" ]; then
            echo "Error: $FILE nahi mila!"
            exit 1
          fi

          # Purane hdnea ko naye se replace karein
          sed -i "s|hdnea=[^&\"' ]*|${HDNEA}|g" "$FILE"
          echo "Updated $FILE with new token."

      - name: Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Slivtv.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update SonyLIV hdnea (via India VPS Proxy)"
            git push
            echo "Changes pushed successfully!"
          fi
