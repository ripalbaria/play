name: Update SonyLIV Channels 

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Fetch hdnea using yt-dlp
        id: fetch_hdnea
        run: |
          VIDEO_PAGE_URL="https://www.sonyliv.com/details/video/1000051729"
          
          echo "Fetching token using yt-dlp..."
          
          # yt-dlp gets the final manifest URL which contains the hdnea token
          # --get-url retrieves the direct .mpd link after all redirects and authorization
          FINAL_URL=$(yt-dlp --get-url "$VIDEO_PAGE_URL")

          if [ -z "$FINAL_URL" ]; then
            echo "Error: yt-dlp could not retrieve the URL."
            exit 1
          fi

          # Extract hdnea from the final URL
          HDNEA=$(echo "$FINAL_URL" | grep -o 'hdnea=[^&" ]*' | head -1)

          if [ -z "$HDNEA" ]; then
            echo "Error: hdnea token not found in the manifest URL."
            echo "URL Debug: $FINAL_URL"
            exit 1
          fi

          echo "Extracted hdnea: $HDNEA"
          echo "HDNEA=$HDNEA" >> $GITHUB_OUTPUT

      - name: Update Slivtv.json
        run: |
          HDNEA="${{ steps.fetch_hdnea.outputs.HDNEA }}"
          FILE="Slivtv.json"

          if [ ! -f "$FILE" ]; then
            echo "$FILE not found!"
            exit 1
          fi

          # Replace hdnea in all links using sed
          sed -i "s|hdnea=[^&\"' ]*|${HDNEA}|g" "$FILE"
          echo "Updated $FILE with new hdnea"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Slivtv.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Auto-update hdnea via yt-dlp"
            git push
            echo "Pushed updates!"
          fi
