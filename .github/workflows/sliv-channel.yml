name: Update SonyLIV Channels 

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch hdnea using ScraperAPI
        id: fetch_hdnea
        run: |
          # Your ScraperAPI Key from the screenshot
          API_KEY="e26053076e5a9c2f408e2567e957800"
          
          # Target SonyLIV URL
          TARGET_URL="https://apiv4.sonyliv.com/AGL/4.7/A/ENG/MWEB/IN/BR/CONTENT/VIDEOURL/VOD/1000051729"
          
          # Construct ScraperAPI URL with Indian Geotargeting
          # country_code=in ensures the request comes from India
          # render=true is optional but helps if SonyLIV uses heavy JS
          SCRAPER_URL="http://api.scraperapi.com?api_key=${API_KEY}&url=${TARGET_URL}&country_code=in"

          echo "Fetching SonyLIV API via ScraperAPI (India)..."

          # Increase timeout to 70s as recommended by ScraperAPI
          RESPONSE=$(curl -s -L --connect-timeout 30 --max-time 75 "$SCRAPER_URL")

          if [[ "$RESPONSE" == *"EPDblocked"* ]]; then
            echo "Error: Still blocked. Try adding '&premium=true' to the URL."
            exit 1
          fi

          VIDEO_URL=$(echo "$RESPONSE" | grep -o '"videoURL":"[^"]*' | cut -d'"' -f4 | head -1)

          if [[ "$VIDEO_URL" == *"http"* ]]; then
            HDNEA=$(echo "$VIDEO_URL" | grep -o 'hdnea=[^&" ]*')
            echo "HDNEA=$HDNEA" >> $GITHUB_OUTPUT
            echo "Success! Found HDNEA token."
          else
            echo "Error: Could not find videoURL in response."
            echo "Full Response: $RESPONSE"
            exit 1
          fi

      - name: Update Slivtv.json
        run: |
          HDNEA="${{ steps.fetch_hdnea.outputs.HDNEA }}"
          sed -i "s|hdnea=[^&\"' ]*|${HDNEA}|g" Slivtv.json

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Slivtv.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update via ScraperAPI" && git push)
