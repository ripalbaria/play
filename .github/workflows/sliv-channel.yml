name: sonyliv Auto Update

on:
  schedule:
    - cron: '0 */8 * * *'   # Har 8 ghante mein run hoga (Credits bachane ke liye)
  workflow_dispatch:        # Manual run karne ke liye button

jobs:
  update-tokens:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch hdnea via ScraperAPI
        id: fetch_hdnea
        env:
          # GitHub secrets se ScraperAPI key le rahe hain
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SONYLIV_URL: "https://apiv4.sonyliv.com/AGL/4.7/A/ENG/MWEB/IN/BR/CONTENT/VIDEOURL/VOD/1000051729"
        run: |
          echo "Fetching token using ScraperAPI (India Proxy)..."
          
          # ScraperAPI request (country_code=in ke sath)
          RESPONSE=$(curl -s "http://api.scraperapi.com?api_key=${SCRAPER_API_KEY}&url=${SONYLIV_URL}&country_code=in&keep_headers=true" \
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Safari/537.36' \
            -H 'Referer: https://www.sonyliv.com/')

          if [ -z "$RESPONSE" ]; then
            echo "Error: Empty Response from ScraperAPI."
            exit 1
          fi

          # Response check aur Token extract
          echo "$RESPONSE" > api_response.json
          VIDEO_URL=$(echo "$RESPONSE" | grep -o '"videoURL":"[^"]*' | cut -d'"' -f4 | head -1)
          HDNEA=$(echo "$VIDEO_URL" | grep -o 'hdnea=[^&" ]*' | head -1)

          if [ -z "$HDNEA" ]; then
            echo "Error: Token extraction failed. Response details:"
            cat api_response.json
            exit 1
          fi

          echo "Success! Token found."
          echo "HDNEA=$HDNEA" >> $GITHUB_OUTPUT

      - name: Update s111.m3u
        run: |
          NEW_TOKEN="${{ steps.fetch_hdnea.outputs.HDNEA }}"
          sed -i "s|hdnea=[^&\"' ]*|${NEW_TOKEN}|g" s111.m3u
          echo "Updated s111.m3u successfully."

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add s111.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update sonyliv token" && git push)
