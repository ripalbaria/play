name: Update SonyLIV Channels 

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch hdnea using Authenticated Proxy
        id: fetch_hdnea
        run: |
          # Aapki Private Proxy Detail
          PROXY_URL="http://drrhuszw:ydswngc3lhmv@142.111.48.253:7030/"
          API_URL="https://apiv4.sonyliv.com/AGL/4.7/A/ENG/MWEB/IN/BR/CONTENT/VIDEOURL/VOD/1000051729"

          echo "Fetching SonyLIV API via Private Authenticated Proxy..."

          # --proxy-anyauth handle karega username/password authentication ko
          # --retry 2 se agar network issue ho toh auto-retry karega
          RESPONSE=$(curl -s -L --connect-timeout 15 --max-time 30 --retry 2 \
            --proxy "$PROXY_URL" \
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Safari/537.36' \
            -H 'Referer: https://www.sonyliv.com/' \
            -H 'Origin: https://www.sonyliv.com' \
            "$API_URL")

          # Check if response is empty or blocked
          if [ -z "$RESPONSE" ]; then
            echo "Error: Proxy se koi response nahi mila."
            exit 1
          fi

          # Extract videoURL
          VIDEO_URL=$(echo "$RESPONSE" | grep -o '"videoURL":"[^"]*' | cut -d'"' -f4 | head -1)

          if [[ "$VIDEO_URL" == *"http"* ]]; then
            echo "Success! Found videoURL."
            
            # Extract hdnea token
            HDNEA=$(echo "$VIDEO_URL" | grep -o 'hdnea=[^&" ]*')
            
            if [ ! -z "$HDNEA" ]; then
              echo "Extracted HDNEA: $HDNEA"
              echo "HDNEA=$HDNEA" >> $GITHUB_OUTPUT
            else
              echo "Error: videoURL toh mila par hdnea token nahi mila."
              exit 1
            fi
          else
            echo "Error: SonyLIV API ne block kar diya ya galat data bheja."
            echo "API Response: $RESPONSE"
            exit 1
          fi

      - name: Update Slivtv.json
        run: |
          HDNEA="${{ steps.fetch_hdnea.outputs.HDNEA }}"
          if [ -f "Slivtv.json" ]; then
            sed -i "s|hdnea=[^&\"' ]*|${HDNEA}|g" Slivtv.json
            echo "Slivtv.json updated with new token."
          else
            echo "Error: Slivtv.json file missing!"
            exit 1
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Slivtv.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update SonyLIV (Auth Proxy)" && git push)
