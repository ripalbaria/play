name: SonyLIV Auto Update

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update-tokens:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch hdnea (Bypass via Indian VPS)
        id: fetch_hdnea
        run: |
          PROXY="http://140.245.25.215:3128"
          API_URL="https://apiv4.sonyliv.com/AGL/4.7/A/ENG/MWEB/IN/BR/CONTENT/VIDEOURL/VOD/1000051729"

          echo "Connecting to Indian VPS Proxy..."
          # Connect timeout ko 120s rakha hai slow VPS ke liye
          RESPONSE=$(curl -s -L -x "$PROXY" \
            --connect-timeout 120 \
            --retry 5 \
            --retry-delay 10 \
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Safari/537.36' \
            -H 'Referer: https://www.sonyliv.com/' \
            "$API_URL")

          if [ -z "$RESPONSE" ]; then
            echo "Error: Timeout or Empty Response. Check if VPS firewalld is stopped."
            exit 1
          fi

          echo "$RESPONSE" > api_response.json
          VIDEO_URL=$(echo "$RESPONSE" | grep -o '"videoURL":"[^"]*' | cut -d'"' -f4 | head -1)
          HDNEA=$(echo "$VIDEO_URL" | grep -o 'hdnea=[^&" ]*' | head -1)

          if [ -z "$HDNEA" ]; then
            echo "Error: Token extraction failed."
            exit 1
          fi

          echo "Success! HDNEA=$HDNEA"
          echo "HDNEA=$HDNEA" >> $GITHUB_OUTPUT

      - name: Update Slivtv.json
        run: |
          NEW_TOKEN="${{ steps.fetch_hdnea.outputs.HDNEA }}"
          # Sabhi purane hdnea tokens ko replace karein
          sed -i "s|hdnea=[^&\"' ]*|${NEW_TOKEN}|g" Slivtv.json
          echo "Updated Slivtv.json successfully."

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Slivtv.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update SonyLIV" && git push)
