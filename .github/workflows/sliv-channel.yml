name: Update SonyLIV Channels 

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Setup Cloudflare WARP
        run: |
          # Cloudflare repository setup
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          
          # Install and Connect
          sudo apt-get update && sudo apt-get install cloudflare-warp -y
          warp-cli --accept-tos registration new
          warp-cli --accept-tos connect
          
          # Wait for connection
          sleep 10
          echo "Connected IP:"
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep ip

      - name: Fetch hdnea using yt-dlp
        id: fetch_hdnea
        run: |
          VIDEO_PAGE_URL="https://www.sonyliv.com/details/video/1000051729"
          
          echo "Fetching token through WARP tunnel..."
          # WARP system traffic ko handle karta hai, isliye yt-dlp automatically use karega
          # --no-check-certificate SSL issues fix karega
          FINAL_URL=$(yt-dlp --no-check-certificate --get-url "$VIDEO_PAGE_URL")

          if [ -z "$FINAL_URL" ]; then
            echo "Error: Failed to fetch URL even with WARP."
            exit 1
          fi

          HDNEA=$(echo "$FINAL_URL" | grep -o 'hdnea=[^&" ]*' | head -1)

          if [ -z "$HDNEA" ]; then
            echo "Error: hdnea token not found."
            exit 1
          fi

          echo "Extracted hdnea: $HDNEA"
          echo "HDNEA=$HDNEA" >> $GITHUB_OUTPUT

      - name: Update Slivtv.json
        run: |
          HDNEA="${{ steps.fetch_hdnea.outputs.HDNEA }}"
          FILE="Slivtv.json"
          if [ -f "$FILE" ]; then
            sed -i "s|hdnea=[^&\"' ]*|${HDNEA}|g" "$FILE"
            echo "Updated $FILE successfully."
          else
            echo "$FILE not found!"
            exit 1
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Slivtv.json
          git diff --staged --quiet || (git commit -m "Auto-update via WARP" && git push)
