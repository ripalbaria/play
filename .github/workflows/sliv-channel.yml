name: Update SonyLIV Channels 

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch hdnea with Fast Proxy Rotation
        id: fetch_hdnea
        run: |
          # Fresh 2026 Indian Proxy List
          PROXIES=(
            "103.170.46.245:8080"
            "108.165.152.59:80"
            "43.249.225.174:80"
            "139.59.1.14:3128"
            "64.227.131.240:1080"
            "14.195.222.145:80"
          )

          API_URL="https://apiv4.sonyliv.com/AGL/4.7/A/ENG/MWEB/IN/BR/CONTENT/VIDEOURL/VOD/1000051729"
          SUCCESS=false

          for PROXY in "${PROXIES[@]}"; do
            echo "---------------------------------------"
            echo "Testing Proxy: $PROXY"
            
            # Using --connect-timeout 5 to skip dead proxies instantly
            RESPONSE=$(curl -s -L --connect-timeout 5 --max-time 10 \
              --proxy "$PROXY" \
              -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' \
              -H 'Referer: https://www.sonyliv.com/' \
              "$API_URL")

            # Validate if we got a real JSON response with a videoURL
            VIDEO_URL=$(echo "$RESPONSE" | grep -o '"videoURL":"[^"]*' | cut -d'"' -f4 | head -1)

            if [[ "$VIDEO_URL" == *"http"* ]]; then
              echo "Success! Found videoURL using $PROXY"
              
              # Extract hdnea directly from the URL or the MPD
              HDNEA=$(echo "$VIDEO_URL" | grep -o 'hdnea=[^&" ]*')
              
              if [ -z "$HDNEA" ]; then
                # Fallback: Check MPD content if not in URL
                MPD_CONTENT=$(curl -s -L --connect-timeout 5 --proxy "$PROXY" "$VIDEO_URL")
                HDNEA=$(echo "$MPD_CONTENT" | grep -o 'hdnea=[^&" ]*' | head -1)
              fi

              if [ ! -z "$HDNEA" ]; then
                echo "Extracted: $HDNEA"
                echo "HDNEA=$HDNEA" >> $GITHUB_OUTPUT
                SUCCESS=true
                break
              fi
            fi
            echo "Proxy $PROXY timed out (Error 28) or returned invalid data. Trying next..."
          done

          if [ "$SUCCESS" = false ]; then
            echo "Error: All proxies failed. No Indian connection established."
            exit 1
          fi

      - name: Update Slivtv.json
        run: |
          HDNEA="${{ steps.fetch_hdnea.outputs.HDNEA }}"
          sed -i "s|hdnea=[^&\"' ]*|${HDNEA}|g" Slivtv.json

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Slivtv.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update SonyLIV hdnea" && git push)
            git commit -m "Auto-update SonyLIV hdnea (Proxy Rotation)"
            git push
          fi
