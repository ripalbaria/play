name: Update SonyLIV Channels 

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch hdnea using curl (Proxy Enabled)
        id: fetch_hdnea
        run: |
          API_URL="https://apiv4.sonyliv.com/AGL/4.7/A/ENG/MWEB/IN/BR/CONTENT/VIDEOURL/VOD/1000051729"
          PROXY="103.170.46.245:8080"

          echo "Fetching API using proxy: $PROXY"
          RESPONSE=$(curl -s -k -L -x "$PROXY" \
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Safari/537.36' \
            -H 'Accept: application/json, text/plain, */*' \
            -H 'Accept-Language: en-US,en;q=0.9' \
            -H 'Referer: https://www.sonyliv.com/' \
            -H 'Origin: https://www.sonyliv.com' \
            -H 'Connection: keep-alive' \
            "$API_URL")

          echo "$RESPONSE" > api_response.json

          VIDEO_URL=$(echo "$RESPONSE" | grep -o '"videoURL":"[^"]*' | cut -d'"' -f4 | head -1)
          if [ -z "$VIDEO_URL" ]; then
            echo "videoURL not found! Proxy might be blocked or dead."
            cat api_response.json
            exit 1
          fi

          echo "Found videoURL: $VIDEO_URL"

          MPD_CONTENT=$(curl -s -k -L -x "$PROXY" \
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' \
            -H 'Referer: https://www.sonyliv.com/' \
            "$VIDEO_URL")

          HDNEA=$(echo "$MPD_CONTENT" | grep -o 'hdnea=[^&" ]*' | head -1)
          if [ -z "$HDNEA" ]; then
            HDNEA=$(echo "$VIDEO_URL" | grep -o 'hdnea=[^&" ]*')
          fi

          if [ -z "$HDNEA" ]; then
            echo "hdnea not found!"
            exit 1
          fi

          echo "Extracted hdnea: $HDNEA"
          echo "HDNEA=$HDNEA" >> $GITHUB_OUTPUT

      - name: Update Slivtv.json
        run: |
          HDNEA="${{ steps.fetch_hdnea.outputs.HDNEA }}"
          FILE="Slivtv.json"
          if [ ! -f "$FILE" ]; then echo "$FILE not found!"; exit 1; fi
          sed -i "s|hdnea=[^&\"' ]*|${HDNEA}|g" "$FILE"
          echo "Updated $FILE"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Slivtv.json
          git diff --staged --quiet || (git commit -m "Auto-update hdnea" && git push)
