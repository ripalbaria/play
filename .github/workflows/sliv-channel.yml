name: Update SonyLIV Channels 

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch hdnea with High-Uptime Proxies
        id: fetch_hdnea
        run: |
          # Selection of more stable Indian Datacenter/Residential IPs
          PROXIES=(
            "49.36.212.181:80"
            "103.119.144.114:8080"
            "157.119.205.10:8080"
            "103.81.105.114:80"
            "202.131.144.155:80"
          )

          API_URL="https://apiv4.sonyliv.com/AGL/4.7/A/ENG/MWEB/IN/BR/CONTENT/VIDEOURL/VOD/1000051729"
          SUCCESS=false

          for PROXY in "${PROXIES[@]}"; do
            echo "---------------------------------------"
            echo "Testing Proxy: $PROXY"
            
            # Increased timeout slightly for Indian mobile/residential proxies
            if RESPONSE=$(curl -s -L --connect-timeout 10 --max-time 20 \
              --proxy "$PROXY" \
              -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' \
              -H 'Referer: https://www.sonyliv.com/' \
              -H 'Origin: https://www.sonyliv.com' \
              "$API_URL"); then

              VIDEO_URL=$(echo "$RESPONSE" | grep -o '"videoURL":"[^"]*' | cut -d'"' -f4 | head -1)

              if [[ "$VIDEO_URL" == *"http"* ]]; then
                echo "Success! Found videoURL using $PROXY"
                HDNEA=$(echo "$VIDEO_URL" | grep -o 'hdnea=[^&" ]*')
                
                if [ ! -z "$HDNEA" ]; then
                  echo "HDNEA=$HDNEA" >> $GITHUB_OUTPUT
                  SUCCESS=true
                  break
                fi
              fi
            else
              echo "Proxy $PROXY timed out."
            fi
            echo "Moving to next..."
          done

          if [ "$SUCCESS" = false ]; then
            echo "All proxies in the list failed. SonyLIV may have updated their firewall."
            exit 1
          fi

      - name: Update Slivtv.json
        run: |
          HDNEA="${{ steps.fetch_hdnea.outputs.HDNEA }}"
          sed -i "s|hdnea=[^&\"' ]*|${HDNEA}|g" Slivtv.json

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Slivtv.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update hdnea" && git push)
