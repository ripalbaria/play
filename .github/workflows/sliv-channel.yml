name: Update SonyLIV Channels 

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Fetch hdnea using yt-dlp
        id: fetch_hdnea
        run: |
          VIDEO_PAGE_URL="https://www.sonyliv.com/details/video/1000051729"
          
          # IMPORTANT: Public proxies die fast. Replace this with a fresh India IP if it fails.
          # Format: http://IP:PORT
          PROXY="http://103.180.161.18:8080" 

          echo "Fetching token using yt-dlp via Indian Proxy..."
          
          # --proxy: Uses the Indian IP to bypass geo-blocks
          # --no-check-certificate: Fixes SSL Error 60 (like curl -k)
          # --get-url: Only outputs the final manifest URL containing hdnea
          FINAL_URL=$(yt-dlp --proxy "$PROXY" --no-check-certificate --get-url "$VIDEO_PAGE_URL")

          if [ -z "$FINAL_URL" ]; then
            echo "Error: yt-dlp failed. The proxy might be offline or blocked by Sony."
            exit 1
          fi

          # Extract the hdnea token from the authorized URL
          HDNEA=$(echo "$FINAL_URL" | grep -o 'hdnea=[^&" ]*' | head -1)

          if [ -z "$HDNEA" ]; then
            echo "Error: hdnea token not found in the final URL."
            echo "Debug URL: $FINAL_URL"
            exit 1
          fi

          echo "Extracted hdnea: $HDNEA"
          echo "HDNEA=$HDNEA" >> $GITHUB_OUTPUT

      - name: Update Slivtv.json
        run: |
          HDNEA="${{ steps.fetch_hdnea.outputs.HDNEA }}"
          FILE="Slivtv.json"
          
          if [ -f "$FILE" ]; then
            # Replace old hdnea with the new one globally in the file
            sed -i "s|hdnea=[^&\"' ]*|${HDNEA}|g" "$FILE"
            echo "Successfully updated $FILE"
          else
            echo "Error: $FILE not found in repository."
            exit 1
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Slivtv.json
          # Only commit if the file actually changed
          if git diff --staged --quiet; then
            echo "No changes detected in Slivtv.json"
          else
            git commit -m "Auto-update hdnea via Indian Proxy"
            git push
            echo "Changes pushed to repository."
          fi
