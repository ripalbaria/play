name: Update SonyLIV Channels

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch with Proxy
        run: |
          # Fresh Indian HTTP Proxy (103.141.216.51:80)
          # Agar ye fail ho toh upar table se doosri IP replace karein
          RESPONSE=$(curl -k -x "http://103.141.216.51:80" -L --compressed \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36" \
            -H "Accept: application/json, text/plain, */*" \
            -H "Origin: https://www.sonyliv.com" \
            -H "Referer: https://www.sonyliv.com/" \
            --connect-timeout 30 \
            "https://apiv4.sonyliv.com/AGL/4.7/A/ENG/MWEB/IN/BR/CONTENT/VIDEOURL/VOD/1000051729")

          VIDEO_URL=$(echo "$RESPONSE" | grep -o '"videoURL":"[^"]*' | cut -d'"' -f4 | head -1)
          
          if [ -n "$VIDEO_URL" ]; then
            HDNEA=$(echo "$VIDEO_URL" | grep -o 'hdnea=[^&" ]*')
            if [ -f "Slivtv.json" ]; then
              sed -i "s|hdnea=[^&\"' ]*|${HDNEA}|g" "Slivtv.json"
              echo "SUCCESS: Token updated in Slivtv.json"
            else
              echo "FAILURE: Slivtv.json not found."
              exit 1
            fi
          else
            echo "FAILURE: Access Denied or Blocked. Full Response: $RESPONSE"
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GithubBot"
          git config --global user.email "bot@github.com"
          git add Slivtv.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Sony Token: $(date)" && git push)
