name: SonyLIV Auto Update

on:
  schedule:
    - cron: '0 */4 * * *'   # Runs every 4 hours
  workflow_dispatch:        # Allows manual run

jobs:
  update-tokens:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch hdnea (Bypass via Indian VPS)
        id: fetch_hdnea
        env:
          PROXY: ${{ secrets.SONY_PROXY }}
          API_URL: ${{ secrets.SONY_API_URL }}
        run: |
          echo "Connecting to Indian VPS Proxy..."
          RESPONSE=$(curl -s -L -x "$PROXY" \
            --connect-timeout 120 \
            --retry 5 \
            --retry-delay 10 \
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Safari/537.36' \
            -H 'Referer: https://www.sonyliv.com/' \
            "$API_URL")

          if [ -z "$RESPONSE" ]; then
            echo "Error: Timeout or Empty Response. Check if VPS is running."
            exit 1
          fi

          # Extracting video URL and token
          VIDEO_URL=$(echo "$RESPONSE" | grep -o '"videoURL":"[^"]*' | cut -d'"' -f4 | head -1)
          HDNEA=$(echo "$VIDEO_URL" | grep -o 'hdnea=[^&" ]*' | head -1)

          if [ -z "$HDNEA" ]; then
            echo "Error: Token extraction failed. Response might be geo-blocked."
            exit 1
          fi

          echo "Success! Token found."
          echo "HDNEA=$HDNEA" >> $GITHUB_OUTPUT

      - name: Update s111.m3u and Verify
        run: |
          NEW_TOKEN="${{ steps.fetch_hdnea.outputs.HDNEA }}"
          
          echo "Debug: Looking for current lines containing hdnea=..."
          grep "hdnea=" s111.m3u | head -n 2 || echo "No hdnea= pattern found in file!"

          # Apply the update
          sed -i "s|hdnea=[^&\"' ]*|${NEW_TOKEN}|g" s111.m3u
          
          echo "Debug: Verification after update (showing first 2 matches):"
          grep "hdnea=" s111.m3u | head -n 2

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the file
          git add s111.m3u
          
          # Forced Check: If git status shows no changes, it means sed didn't find the pattern
          if git diff --staged --quiet; then
            echo "Failure: No changes detected in s111.m3u. Check if the 'hdnea=' pattern matches your file exactly."
            exit 1
          else
            echo "Changes detected. Committing..."
            git commit -m "Auto-update SonyLIV token"
            git push
          fi
