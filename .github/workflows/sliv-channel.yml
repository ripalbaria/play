name: Update SonyLIV Channels 

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch hdnea with HTTPS Elite Proxies
        id: fetch_hdnea
        run: |
          # Elite Indian Proxies with HTTPS support
          # Note: Using https:// prefix tells curl to use SSL tunneling
          PROXIES=(
            "http://103.170.46.245:8080"
            "http://43.251.107.130:80"
            "http://103.151.141.229:3128"
            "http://182.72.115.150:80"
          )

          API_URL="https://apiv4.sonyliv.com/AGL/4.7/A/ENG/MWEB/IN/BR/CONTENT/VIDEOURL/VOD/1000051729"
          SUCCESS=false

          for PROXY in "${PROXIES[@]}"; do
            echo "---------------------------------------"
            echo "Testing HTTPS Tunnel via Proxy: $PROXY"
            
            # Using --proxy-insecure if the proxy has a self-signed cert
            if RESPONSE=$(curl -s -L --connect-timeout 15 --max-time 30 \
              --proxy "$PROXY" \
              -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' \
              -H 'Referer: https://www.sonyliv.com/' \
              "$API_URL"); then

              # Check if SonyLIV detected the proxy tunnel
              if [[ "$RESPONSE" == *"EPDblocked"* ]]; then
                echo "Blocked by SonyLIV (VPN/Proxy Detected)."
                continue
              fi

              VIDEO_URL=$(echo "$RESPONSE" | grep -o '"videoURL":"[^"]*' | cut -d'"' -f4 | head -1)

              if [[ "$VIDEO_URL" == *"http"* ]]; then
                echo "Success! Found videoURL using HTTPS Tunnel."
                HDNEA=$(echo "$VIDEO_URL" | grep -o 'hdnea=[^&" ]*')
                
                if [ ! -z "$HDNEA" ]; then
                  echo "HDNEA=$HDNEA" >> $GITHUB_OUTPUT
                  SUCCESS=true
                  break
                fi
              fi
            else
              echo "Connection Timeout (Exit Code 28). Proxy might not support HTTPS."
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "All HTTPS proxies failed to bypass SonyLIV security."
            exit 1
          fi

      - name: Update Slivtv.json
        run: |
          HDNEA="${{ steps.fetch_hdnea.outputs.HDNEA }}"
          sed -i "s|hdnea=[^&\"' ]*|${HDNEA}|g" Slivtv.json

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Slivtv.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update (HTTPS Proxy)" && git push)
