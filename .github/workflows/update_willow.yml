name: Update Willow Sports Channel

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  update-channel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Format Willow
        run: |
          # 1. Download the latest M3U
          curl -s https://raw.githubusercontent.com/Love4vn/love4vn/refs/heads/main/S_check.m3u -o playlist.m3u
          
          # 2. Use grep to find the line number of Willow Sports (SD)
          LINE_NUM=$(grep -n "Willow Sports (SD)" playlist.m3u | cut -d: -f1 | head -n 1)
          
          if [ -z "$LINE_NUM" ]; then
            echo "Channel not found"
            exit 0
          fi

          # 3. Extract specific lines relative to the name
          # Line +1 is usually license type, +2 is license key, +3 is the URL
          LICENSE_KEY=$(sed -n "$((LINE_NUM+2))p" playlist.m3u | cut -d'=' -f2)
          STREAM_URL=$(sed -n "$((LINE_NUM+3))p" playlist.m3u | xargs)

          # 4. Update Slivtv.json
          # This removes the old Willow entry and adds a fresh one with CLEAN formatting
          # It puts the license in a way that players can often read or keeps the URL clean
          jq --arg key "$LICENSE_KEY" --arg url "$STREAM_URL" \
          'map(select(.name != "Willow Sports (SD)")) + [{"name": "Willow Sports (SD)", "url": $url, "license_key": $key}]' \
          Slivtv.json > tmp.json && mv tmp.json Slivtv.json

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Slivtv.json
          git commit -m "Update Willow: Clean Format" || exit 0
          git push
