name: Update Willow Sports Channel

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  update-channel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Willow Sports Entry
        run: |
          # 1. Download the M3U
          curl -s https://raw.githubusercontent.com/Love4vn/love4vn/refs/heads/main/S_check.m3u -o playlist.m3u
          
          # 2. Extract the full block (EXTINF line + logo + 2 KODIPROP lines + URL)
          # This grabs the 4 lines after the match to include the .mpd link
          BLOCK=$(grep -B 1 -A 4 "Willow Sports (SD)" playlist.m3u)
          
          if [ -z "$BLOCK" ]; then
            echo "Willow Sports block not found. Skipping."
            exit 0
          fi

          # 3. Clean Slivtv.json and Add the single fresh entry
          # First, it filters out any existing object where name is "Willow Sports (SD)"
          # Then, it appends the new block into the 'url' field
          jq --arg content "$BLOCK" \
          'map(select(.name != "Willow Sports (SD)")) + [{"name": "Willow Sports (SD)", "url": $content}]' \
          Slivtv.json > tmp.json && mv tmp.json Slivtv.json

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Slivtv.json
          git commit -m "Overwrite Willow Sports (SD) with fresh link" || exit 0
          git push
