name: Update Willow Sports Channel

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  update-channel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Overwrite Willow Entry
        run: |
          # 1. Download the M3U source
          curl -s https://raw.githubusercontent.com/Love4vn/love4vn/refs/heads/main/S_check.m3u -o playlist.m3u
          
          # 2. Extract the exact block (including props and url)
          # We search for the name and get 4 lines after it
          BLOCK=$(grep -A 4 "Willow Sports (SD)" playlist.m3u)
          
          if [ -z "$BLOCK" ]; then
            echo "Willow Sports not found. Skipping."
            exit 0
          fi

          # 3. Use a temporary python script to perfectly format the JSON
          # This ensures real newlines, not \n text
          python3 -c "
          import json
          with open('Slivtv.json', 'r') as f:
              data = json.load(f)
          
          # Remove any old Willow entry
          data = [item for item in data if item.get('name') != 'Willow Sports (SD)']
          
          # Add the fresh entry with real multi-line formatting
          new_entry = {
              'logo': 'https://i.ibb.co.com/BCHXWwH/Shareext-champion-league.jpg',
              'name': 'Willow Sports (SD)',
              'url': \"$BLOCK\"
          }
          data.append(new_entry)
          
          with open('Slivtv.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Slivtv.json
          git commit -m "Overwrite Willow with proper formatting" || exit 0
          git push
