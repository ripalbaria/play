name: Update Willow Sports Channel

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  update-channel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Overwrite Willow Entry
        run: |
          # 1. Download the M3U source
          curl -s https://raw.githubusercontent.com/Love4vn/love4vn/refs/heads/main/S_check.m3u -o playlist.m3u
          
          # 2. Extract the exact block (including props and url)
          # We search for the name and get 4 lines after it
          # This captures #KODIPROP and the .mpd link
          BLOCK=$(grep -A 4 "Willow Sports (SD)" playlist.m3u)
          
          if [ -z "$BLOCK" ]; then
            echo "Willow Sports not found. Skipping."
            exit 0
          fi

          # 3. Use jq to delete the old entry and add the fresh one
          # We use --arg to safely pass the block so newlines are handled correctly
          jq --arg content "$BLOCK" \
          'map(select(.name != "Willow Sports (SD)")) + 
          [{"logo": "https://i.ibb.co.com/BCHXWwH/Shareext-champion-league.jpg", 
            "name": "Willow Sports (SD)", 
            "url": $content}]' \
          Slivtv.json > tmp.json && mv tmp.json Slivtv.json

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Slivtv.json
          git commit -m "Overwrite Willow with clean multi-line format" || exit 0
          git push
